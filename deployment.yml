apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy

spec:
  replicas: 2
  selector:
    matchLabels:
      app: latha

  template:
    metadata:
      labels:
        app: latha

    spec:
      containers:
      - name: cont-1
        image: kartheek0976/priya:3
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mysvc
spec:
  type: LoadBalancer
  selector:
    app: latha
  ports:
  - port: 80
    targetPort: 80
